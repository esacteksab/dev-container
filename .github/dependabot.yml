version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7

  - package-ecosystem: "pre-commit" # zizmor: ignore[dependabot-cooldown]
    directory: "/"
    groups:
      pre-commit-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
      timezone: "America/Chicago"
