# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: PR Build

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - zshrc
      - vimrc
      - package.json
      - pnpm-lock.yaml
      - .devcontainer/devcontainer.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: dev-container:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install container-structure-test
        run: |
          curl -fsSL -o container-structure-test \
            https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x container-structure-test
          sudo mv container-structure-test /usr/local/bin/

      - name: Run container structure tests
        run: |
          container-structure-test test \
            --image dev-container:ci \
            --config container-structure-test.yaml
