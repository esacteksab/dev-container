name: PR Build

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - zshrc
      - vimrc
      - package.json
      - pnpm-lock.yaml
      - .devcontainer/devcontainer.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 #v7.0.0
        with:
          context: .
          push: false
          load: true
          tags: dev-container:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install container-structure-test
        run: |
          curl -fsSL -o container-structure-test \
            https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x container-structure-test
          sudo mv container-structure-test /usr/local/bin/

      - name: Run container structure tests
        run: |
          container-structure-test test \
            --image dev-container:ci \
            --config container-structure-test.yaml
